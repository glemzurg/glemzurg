<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 580 176" preserveAspectRatio="xMinYMin meet">
  <defs>
    <style>text {&#xA;  font-family: &#34;helvetica neue&#34;, arial, sans-serif, system-ui;&#xA;}&#xA;&#xA;text.seq-desc {&#xA;  font-family: &#34;Meslo&#34;, &#34;JetBrains Mono&#34;, &#34;Hack&#34;, &#34;Menlo&#34;, monospace;&#xA;}&#xA;</style>
    <marker id="seq-dot" viewBox="0 0 10 10" markerWidth="5" markerHeight="5" refX="5" refY="5">
      <circle cx="5" cy="5" r="3" fill="context-fill"></circle>
    </marker>
    <marker id="seq-arrow" viewBox="0 0 10 10" markerWidth="5" markerHeight="5" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="context-fill"></path>
    </marker>
  </defs>
  <rect x="0" y="0" width="580" height="176" fill="#FFFFFF"></rect>
  <line x1="110" y1="26" x2="110" y2="176" stroke="#CCCCCC" stroke-width="2" stroke-dasharray="8 8"></line>
  <text x="110" y="18" fill="#000000" stroke="none" font-size="16" text-anchor="middle">Joe:Customer</text>
  <line x1="290" y1="26" x2="290" y2="176" stroke="#CCCCCC" stroke-width="2" stroke-dasharray="8 8"></line>
  <text x="290" y="18" fill="#000000" stroke="none" font-size="16" text-anchor="middle">*:Title</text>
  <line x1="470" y1="26" x2="470" y2="176" stroke="#CCCCCC" stroke-width="2" stroke-dasharray="8 8"></line>
  <text x="470" y="18" fill="#000000" stroke="none" font-size="16" text-anchor="middle">*:Medium</text>
  <line x1="470" y1="82" x2="295" y2="82" fill="#000000" stroke="#000000" stroke-width="2" marker-start="url(#seq-dot)" marker-end="url(#seq-arrow)"></line>
  <text class="seq-desc" x="380" y="75" fill="#000000" stroke="none" font-size="10" text-anchor="middle">ISBN, selling price?</text>
  <text class="seq-desc" x="380" y="61" fill="#000000" stroke="none" font-size="10" text-anchor="middle">*[Medium for Title and is visible]</text>
  <line x1="290" y1="146" x2="115" y2="146" fill="#000000" stroke="#000000" stroke-width="2" marker-start="url(#seq-dot)" marker-end="url(#seq-arrow)"></line>
  <text class="seq-desc" x="200" y="139" fill="#000000" stroke="none" font-size="10" text-anchor="middle">title, author, subject, ISBN(s), price(s)</text>
  <text class="seq-desc" x="200" y="125" fill="#000000" stroke="none" font-size="10" text-anchor="middle">[*customer interest]</text>
</svg>