<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 400 208" preserveAspectRatio="xMinYMin meet">
  <defs>
    <style>text {&#xA;  font-family: &#34;helvetica neue&#34;, arial, sans-serif, system-ui;&#xA;}&#xA;&#xA;text.seq-desc {&#xA;  font-family: &#34;Meslo&#34;, &#34;JetBrains Mono&#34;, &#34;Hack&#34;, &#34;Menlo&#34;, monospace;&#xA;}&#xA;</style>
    <marker id="seq-dot" viewBox="0 0 10 10" markerWidth="5" markerHeight="5" refX="5" refY="5">
      <circle cx="5" cy="5" r="3" fill="context-fill"></circle>
    </marker>
    <marker id="seq-arrow" viewBox="0 0 10 10" markerWidth="5" markerHeight="5" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="context-fill"></path>
    </marker>
  </defs>
  <rect x="0" y="0" width="400" height="208" fill="#FFFFFF"></rect>
  <line x1="110" y1="26" x2="110" y2="208" stroke="#CCCCCC" stroke-width="2" stroke-dasharray="8 8"></line>
  <text x="110" y="18" fill="#000000" stroke="none" font-size="16" text-anchor="middle">Bob</text>
  <line x1="290" y1="26" x2="290" y2="208" stroke="#CCCCCC" stroke-width="2" stroke-dasharray="8 8"></line>
  <text x="290" y="18" fill="#000000" stroke="none" font-size="16" text-anchor="middle">Maria</text>
  <rect x="20" y="95" width="360" height="100" fill="#000000" fill-opacity="0.1" stroke="#000000" stroke-width="1"></rect>
  <text x="20" y="93" fill="#000000" stroke="none" font-size="10" text-anchor="start">response</text>
  <line x1="110" y1="68" x2="285" y2="68" fill="#000000" stroke="#000000" stroke-width="2" marker-start="url(#seq-dot)" marker-end="url(#seq-arrow)"></line>
  <text class="seq-desc" x="200" y="61" fill="#000000" stroke="none" font-size="10" text-anchor="middle">Hi! How are you doing?</text>
  <circle cx="290" cy="132" r="3" fill="#667777"></circle>
  <text class="seq-desc" x="290" y="125" fill="#667777" stroke="none" font-size="10" text-anchor="middle">Long time no see...</text>
  <text class="seq-desc" x="290" y="111" fill="#667777" stroke="none" font-size="10" text-anchor="middle">*Thinks*</text>
  <line x1="290" y1="182" x2="115" y2="182" fill="#000000" stroke="#000000" stroke-width="2" marker-start="url(#seq-dot)" marker-end="url(#seq-arrow)"></line>
  <text class="seq-desc" x="200" y="175" fill="#000000" stroke="none" font-size="10" text-anchor="middle">Fine!</text>
</svg>