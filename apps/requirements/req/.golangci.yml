version: "2"

linters:
  default: standard
  enable:
    - dupword
    - errname
    - errorlint
  #   - exhaustive
  #   - forbidigo
  #   - goconst
  #   - gocritic
  #   - godot
  #   - gosec
  #   - intrange
  #   - misspell
  #   - modernize
  #   - nilnil
  #   - noctx
  #   - recvcheck
  #   # - revive
  #   - rowserrcheck
  #   # - testifylint
  #   - unconvert
  #   - unparam
  #   - whitespace

exclusions:
  paths:
    - ".*\\.generated\\.go$"
  rules:
    - linters:
        - dupl
        - gosec
      path: "_test\\.go$"
